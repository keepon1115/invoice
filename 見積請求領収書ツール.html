<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>キープオン｜書類作成ツール（見積書・請求書・領収書）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Serif+JP:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#f4ede1; --panel:#ffffff; --ink:#3a2f24; --ink-soft:#6f6253;
  --brown:#6b4423; --brown-d:#4f3017; --amber:#b8791f; --amber-l:#d8a24a;
  --beige:#e7dcc7; --beige-d:#d8c8ab; --line:#cbb894;
  --shadow:0 6px 24px rgba(80,55,25,.12);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:"Noto Sans JP",sans-serif;color:var(--ink);background:var(--bg);
  -webkit-font-smoothing:antialiased;
}
/* ---- Top bar ---- */
header.topbar{
  background:linear-gradient(180deg,#5a3a1d,#6b4423);color:#f6ecd9;
  padding:14px 26px;display:flex;align-items:center;gap:22px;
  box-shadow:0 2px 10px rgba(0,0,0,.18);position:sticky;top:0;z-index:50;
}
header.topbar .brand{font-weight:900;font-size:18px;letter-spacing:.04em}
header.topbar .brand small{display:block;font-weight:400;font-size:11px;opacity:.8;letter-spacing:.02em}
.tabs{display:flex;gap:6px;margin-left:8px}
.tab{
  border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:14px;
  padding:9px 20px;border-radius:9px 9px 0 0;background:rgba(255,255,255,.12);
  color:#e9dcc4;transition:.15s;
}
.tab:hover{background:rgba(255,255,255,.22)}
.tab.active{background:var(--bg);color:var(--brown)}
.topbar .spacer{flex:1}
.btn-pdf{
  background:var(--amber);color:#fff;border:none;border-radius:9px;cursor:pointer;
  font-family:inherit;font-weight:700;font-size:14px;padding:10px 22px;
  box-shadow:0 3px 10px rgba(184,121,31,.4);transition:.15s;display:flex;gap:8px;align-items:center;
}
.btn-pdf:hover{background:#a06715}
.btn-pdf:disabled{opacity:.55;cursor:wait}

/* ---- Layout ---- */
main{display:grid;grid-template-columns:minmax(440px,520px) 1fr;gap:0;max-width:1280px;margin:0 auto}
.form-pane{padding:22px 24px 60px;overflow:auto}
.preview-pane{background:#e3d5bd;padding:26px 20px 60px;min-height:calc(100vh - 56px);display:flex;flex-direction:column;align-items:center;gap:22px}

/* ---- Form ---- */
.form{display:none}
.form.active{display:block}
.card{background:var(--panel);border:1px solid var(--beige-d);border-radius:12px;padding:18px 18px 14px;margin-bottom:16px;box-shadow:var(--shadow)}
.card h3{margin:0 0 12px;font-size:13px;color:var(--brown);letter-spacing:.06em;border-left:4px solid var(--amber);padding-left:9px}
.field{margin-bottom:11px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:4px}
.field input,.field textarea,.field select{
  width:100%;font-family:inherit;font-size:14px;color:var(--ink);
  border:1px solid var(--beige-d);border-radius:8px;padding:8px 10px;background:#fffdf9;
}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--amber);box-shadow:0 0 0 3px rgba(184,121,31,.15)}
.field textarea{resize:vertical;min-height:54px;line-height:1.5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* item table */
.items{width:100%;border-collapse:collapse;margin-top:4px;table-layout:fixed}
.items th{font-size:11px;color:var(--ink-soft);text-align:left;padding:0 4px 5px;font-weight:700}
.items td{padding:2px 3px;vertical-align:middle}
.items input{padding:7px 8px;font-size:13px;width:100%}
.items .name input{min-width:0}
.items .num input{text-align:right}
.items .amt{font-size:13px;text-align:right;color:var(--ink-soft);white-space:nowrap;padding-right:6px;overflow:hidden;text-overflow:ellipsis}
.items .del{width:30px;text-align:center}
.icon-btn{border:none;background:#f0e4ce;color:var(--brown);width:26px;height:26px;border-radius:7px;cursor:pointer;font-size:15px;line-height:1;font-weight:700}
.icon-btn:hover{background:var(--amber);color:#fff}
.add-row{margin-top:8px;background:#f0e4ce;border:1px dashed var(--line);color:var(--brown);border-radius:8px;padding:8px;width:100%;cursor:pointer;font-family:inherit;font-weight:700;font-size:13px}
.add-row:hover{background:#e8d9bd}
.total-line{text-align:right;font-weight:900;color:var(--brown);font-size:18px;margin-top:10px;padding-top:8px;border-top:2px solid var(--beige-d)}
.hint{font-size:11px;color:var(--ink-soft);margin-top:6px;line-height:1.5}

/* receipt entry cards */
.rcp-entry{border:1px solid var(--beige-d);border-radius:10px;padding:12px;margin-bottom:10px;background:#fffdf9;position:relative}
.rcp-entry .ehead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.rcp-entry .ehead .tag{font-size:11px;font-weight:700;color:var(--amber)}

/* ---- A4 preview ---- */
.page-wrap{box-shadow:0 8px 30px rgba(70,45,15,.28);transform-origin:top center}
.a4{
  width:794px;min-height:1123px;background:#fff;color:#231c12;
  padding:54px 56px;position:relative;font-size:13.5px;line-height:1.6;
}
.a4 .title{font-family:"Noto Serif JP",serif;font-weight:700;text-align:center;font-size:34px;letter-spacing:.5em;color:#2a2014;margin:0 0 4px}
.a4 .title-underline{width:230px;height:3px;background:#6b4423;margin:0 auto 18px}
.a4 .meta-top{position:absolute;top:54px;right:56px;text-align:right;font-size:12px;color:#4a3d2c}
.a4 .head-grid{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;margin-top:30px}
.a4 .to{font-size:21px;font-weight:700;border-bottom:2px solid #2a2014;padding:0 24px 6px 2px;display:inline-block;min-width:280px}
.a4 .to-wrap{flex:1}
.a4 .msg{margin-top:18px;font-size:13px;color:#3a2f22;white-space:pre-wrap}
.a4 .issuer{font-size:12px;line-height:1.7;text-align:left;position:relative;min-width:262px}
.a4 .issuer .co{font-weight:700;font-size:15px;letter-spacing:.02em}
.a4 .issuer .seal{position:absolute;top:-6px;right:-6px;width:74px;height:74px;mix-blend-mode:multiply;opacity:.92}
.a4 .amount-box{display:flex;align-items:center;gap:18px;margin:26px 0 8px;border:2px solid #6b4423;border-radius:6px;padding:12px 20px;background:#faf4e8;width:62%}
.a4 .amount-box .lbl{font-size:15px;font-weight:700;color:#4f3017;letter-spacing:.12em}
.a4 .amount-box .val{font-size:27px;font-weight:900;color:#2a2014;margin-left:auto;font-family:"Noto Serif JP",serif}
.a4 .cond{display:flex;gap:34px;font-size:12.5px;margin:6px 0 14px;color:#3a2f22}
.a4 .cond b{color:#6b4423}
table.dt{width:100%;border-collapse:collapse;margin-top:6px}
table.dt th{background:#6b4423;color:#fdf6e8;font-weight:700;font-size:13px;padding:8px 10px;border:1px solid #6b4423}
table.dt th.n{width:62px}table.dt th.p{width:96px}table.dt th.a{width:110px}
table.dt td{border:1px solid #c9b890;padding:7px 10px;font-size:13px}
table.dt td.r{text-align:right}
table.dt tbody tr:nth-child(even){background:#faf6ee}
table.dt .empty td{height:33px}
table.dt tfoot td{background:#efe3cc;font-weight:900;font-size:15px;color:#3a2614}
.a4 .note{margin-top:16px;border:1px solid #c9b890;border-radius:4px;padding:9px 12px;font-size:11.5px;color:#4a3d2c;background:#fbf8f1;white-space:pre-wrap}
.a4 .note .nh{font-weight:700;color:#6b4423;margin-bottom:2px}
.a4 .foot-issuer{margin-top:30px;display:flex;justify-content:flex-end}
.a4 .bank{margin-top:10px;font-size:11.5px;color:#4a3d2c;border-top:1px dashed #c9b890;padding-top:8px}

/* receipt page */
.a4.rcp{padding:60px 64px}
.a4.rcp .rtop{display:flex;justify-content:space-between;font-size:13px;color:#4a3d2c;margin-bottom:30px}
.a4.rcp .rto{font-size:24px;font-weight:700;border-bottom:2px solid #2a2014;display:inline-block;padding:0 30px 7px 4px;margin-bottom:18px}
.a4.rcp .title{margin:14px 0 6px}
.a4.rcp .ramt{font-family:"Noto Serif JP",serif;font-size:30px;font-weight:700;text-align:center;color:#2a2014;margin:22px 0;letter-spacing:.04em;border-bottom:2px solid #6b4423;display:inline-block;padding-bottom:6px;width:100%}
.a4.rcp .ramtwrap{text-align:center}
.a4.rcp .rline{font-size:15px;margin:12px 0;color:#2f2618}
.a4.rcp .rline b{color:#4f3017;margin-right:6px}
.a4.rcp .rconfirm{font-size:15px;margin-top:24px}
.a4.rcp .rstaff{font-size:14px;margin-top:6px}
.a4.rcp .foot-issuer{position:absolute;left:64px;right:64px;bottom:64px}
.page-badge{font-size:12px;color:#6b4423;font-weight:700;background:#fff;padding:3px 12px;border-radius:20px;box-shadow:var(--shadow)}
.empty-note{color:#7a6a50;font-size:14px;margin-top:40px;text-align:center}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#4f3017;color:#fff;padding:12px 22px;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.3);font-weight:700;z-index:100;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand">キープオン株式会社<small>書類作成・PDF出力ツール</small></div>
  <div class="tabs">
    <button class="tab active" data-tab="est">見積書</button>
    <button class="tab" data-tab="inv">請求書</button>
    <button class="tab" data-tab="rcp">領収書</button>
  </div>
  <div class="spacer"></div>
  <button class="btn-pdf" id="pdfBtn">⬇ PDFを出力</button>
</header>

<main>
  <div class="form-pane">
    <!-- ================= 見積書 ================= -->
    <div class="form active" id="form-est">
      <div class="card">
        <h3>基本情報</h3>
        <div class="field"><label>宛名（御中の前）</label><input class="r" data-k="to" placeholder="つつじが丘小学校PTA"></div>
        <div class="row2">
          <div class="field"><label>見積No.</label><input class="r" data-k="no" placeholder="任意"></div>
          <div class="field"><label>日付</label><input class="r" type="date" data-k="date"></div>
        </div>
        <div class="row2">
          <div class="field"><label>支払条件</label><input class="r" data-k="pay" value="銀行振込(あと払い)"></div>
          <div class="field"><label>納期</label><input class="r" data-k="deadline" value="約2-3週間"></div>
        </div>
        <div class="field"><label>あいさつ文</label><textarea class="r" data-k="msg">下記のとおりお見積り申し上げます。
宜しくご検討賜りますようお願い申し上げます。</textarea></div>
      </div>
      <div class="card">
        <h3>明細</h3>
        <table class="items"><thead><tr><th class="name">名称</th><th class="num" style="width:58px">数量</th><th class="num" style="width:80px">単価</th><th style="width:86px">金額</th><th style="width:28px"></th></tr></thead>
        <tbody class="items-body" data-for="est"></tbody></table>
        <button class="add-row" data-add="est">＋ 行を追加</button>
        <div class="total-line">合計 <span class="total" data-total="est">¥0</span></div>
        <div class="hint">数量を空欄にすると、その行は単価をそのまま金額として扱います（値引き行などに便利）。値引きは単価をマイナスで入力。</div>
      </div>
      <div class="card">
        <h3>摘要</h3>
        <div class="field"><textarea class="r" data-k="note">税込み表示です。振込手数料はお客様ご負担です。</textarea></div>
      </div>
    </div>

    <!-- ================= 請求書 ================= -->
    <div class="form" id="form-inv">
      <div class="card">
        <h3>基本情報</h3>
        <div class="field"><label>宛名（御中の前）</label><input class="r" data-k="to" placeholder="浦和第一女子高等学校 3学年"></div>
        <div class="row2">
          <div class="field"><label>請求No.</label><input class="r" data-k="no" placeholder="任意"></div>
          <div class="field"><label>日付</label><input class="r" type="date" data-k="date"></div>
        </div>
        <div class="row2">
          <div class="field"><label>支払条件</label><input class="r" data-k="pay" value="銀行振込(あと払い)"></div>
          <div class="field"><label>納期</label><input class="r" data-k="deadline" value="ご注文後約1~2週間"></div>
        </div>
        <div class="field"><label>あいさつ文</label><textarea class="r" data-k="msg">下記のとおりご請求申し上げます。
宜しくお願い申し上げます。</textarea></div>
      </div>
      <div class="card">
        <h3>明細</h3>
        <table class="items"><thead><tr><th class="name">名称</th><th class="num" style="width:58px">数量</th><th class="num" style="width:80px">単価</th><th style="width:86px">金額</th><th style="width:28px"></th></tr></thead>
        <tbody class="items-body" data-for="inv"></tbody></table>
        <button class="add-row" data-add="inv">＋ 行を追加</button>
        <div class="total-line">合計 <span class="total" data-total="inv">¥0</span></div>
        <div class="hint">数量を空欄にすると、その行は単価をそのまま金額として扱います。値引きは単価をマイナスで入力。</div>
      </div>
      <div class="card">
        <h3>摘要</h3>
        <div class="field"><textarea class="r" data-k="note">税込み表示です。振込手数料はお客様ご負担です。</textarea></div>
      </div>
    </div>

    <!-- ================= 領収書 ================= -->
    <div class="form" id="form-rcp">
      <div class="card">
        <h3>共通設定（新しい宛名の初期値）</h3>
        <div class="row2">
          <div class="field"><label>担当者</label><input class="rr" data-rk="staff" value="川原"></div>
          <div class="field"><label>既定の決済日</label><input class="rr" type="date" data-rk="defDate"></div>
        </div>
        <div class="row2">
          <div class="field"><label>既定の決済方法</label><input class="rr" data-rk="defMethod" value="クレジット"></div>
          <div class="field"><label>既定の但し書き</label><input class="rr" data-rk="defNote" value="衣装代"></div>
        </div>
      </div>
      <div class="card">
        <h3>宛名ごとの内容（1宛名＝1ページ）</h3>
        <div class="rcp-entries"></div>
        <button class="add-row" id="addRcp">＋ 宛名を追加</button>
        <div class="hint">宛名の数だけPDFページが生成され、1ファイルにまとめてダウンロードされます。</div>
      </div>
    </div>
  </div>

  <div class="preview-pane" id="preview"></div>
</main>
<div class="toast" id="toast"></div>

/* ---------- helpers ---------- */
const $=s=>document.querySelector(s);
const $$=s=>[...document.querySelectorAll(s)];
const todayISO=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
function fmtDate(iso){if(!iso)return'';const d=new Date(iso+'T00:00:00');return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;}
function yymmdd(iso){const d=iso?new Date(iso+'T00:00:00'):new Date();return String(d.getFullYear()).slice(2)+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');}
function yen(n){return '¥'+Math.round(n).toLocaleString('ja-JP');}
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function escBr(s){return esc(s).replace(/\n/g,'<br>');}

/* ---------- item rows (est/inv) ---------- */
function itemRowHTML(){return `<tr class="item-row">
  <td class="name"><input class="it-name" placeholder="作品収納バッグ 持ち手W 白"></td>
  <td class="num"><input class="it-qty" type="number" step="any" placeholder="1"></td>
  <td class="num"><input class="it-price" type="number" step="any" placeholder="0"></td>
  <td class="amt">¥0</td>
  <td class="del"><button class="icon-btn" title="削除">×</button></td></tr>`;}

function addItem(which,vals){
  const body=document.querySelector(`.items-body[data-for="${which}"]`);
  const tmp=document.createElement('tbody');tmp.innerHTML=itemRowHTML();
  const tr=tmp.firstElementChild;
  if(vals){tr.querySelector('.it-name').value=vals.n||'';tr.querySelector('.it-qty').value=vals.q??'';tr.querySelector('.it-price').value=vals.p??'';}
  body.appendChild(tr);
  tr.querySelectorAll('input').forEach(i=>i.addEventListener('input',render));
  tr.querySelector('.icon-btn').addEventListener('click',()=>{tr.remove();render();});
  render();
}
function rowAmount(tr){
  const q=tr.querySelector('.it-qty').value.trim();
  const p=parseFloat(tr.querySelector('.it-price').value);
  if(isNaN(p))return {amt:0,hasQ:q!==''};
  if(q==='')return {amt:p,hasQ:false};
  const qn=parseFloat(q);return {amt:(isNaN(qn)?0:qn)*p,hasQ:true};
}

/* ---------- gather est/inv data ---------- */
function getDoc(which){
  const f=document.getElementById('form-'+which);
  const o={};f.querySelectorAll('.r').forEach(el=>o[el.dataset.k]=el.value);
  o.items=[];let total=0;
  f.querySelectorAll('.item-row').forEach(tr=>{
    const name=tr.querySelector('.it-name').value;
    const q=tr.querySelector('.it-qty').value.trim();
    const p=tr.querySelector('.it-price').value.trim();
    if(name==''&&q==''&&p=='')return;
    const {amt,hasQ}=rowAmount(tr);
    total+=amt;
    o.items.push({name,q,p,amt,hasQ});
    tr.querySelector('.amt').textContent=yen(amt);
  });
  o.total=total;
  return o;
}

/* ---------- render preview ---------- */
function issuerBlock(withBank){
  return `<div class="issuer">
    <img class="seal" src="${SEAL}" alt="印">
    <div class="co">${ISSUER.co}</div>
    <div>${ISSUER.zip}</div>
    <div>${ISSUER.tel}</div>
    <div>${ISSUER.mail}</div>
  </div>`;
}
function docPage(which){
  const isEst=which==='est';
  const d=getDoc(which);
  const title=isEst?'見　積　書':'請　求　書';
  const amtLabel=isEst?'御見積金額':'御請求金額';
  let rows='';
  d.items.forEach(it=>{
    rows+=`<tr><td>${esc(it.name)}</td>
      <td class="r">${it.hasQ?esc(it.q):''}</td>
      <td class="r">${(it.hasQ&&it.p!=='')?yen(parseFloat(it.p)):(it.hasQ?'':'')}</td>
      <td class="r">${yen(it.amt)}</td></tr>`;
  });
  const minRows=6;
  for(let i=d.items.length;i<minRows;i++)rows+=`<tr class="empty"><td></td><td></td><td></td><td></td></tr>`;
  return `<div class="page-wrap"><div class="a4">
    <div class="meta-top">${d.no?('No. '+esc(d.no)+'<br>'):''}${fmtDate(d.date)}</div>
    <div class="title">${title}</div><div class="title-underline"></div>
    <div class="head-grid">
      <div class="to-wrap">
        <div class="to">${esc(d.to)||'&nbsp;'}　御中</div>
        <div class="msg">${escBr(d.msg)}</div>
      </div>
      ${issuerBlock()}
    </div>
    <div class="amount-box"><span class="lbl">${amtLabel}</span><span class="val">${yen(d.total)}</span></div>
    <div class="cond"><div><b>支払条件：</b>${esc(d.pay)}</div><div><b>納期：</b>${esc(d.deadline)}</div></div>
    <table class="dt"><thead><tr><th>名　　称</th><th class="n">数量</th><th class="p">単価</th><th class="a">金額</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr><td colspan="3" class="r">合　計</td><td class="r">${yen(d.total)}</td></tr></tfoot></table>
    <div class="note"><div class="nh">[ 摘 要 ]</div>${escBr(d.note)}</div>
    <div class="bank">${ISSUER.bank}</div>
  </div></div>`;
}

/* ---------- receipt ---------- */
let rcpEntries=[];
function rcpDefaults(){const o={};document.querySelectorAll('.rr').forEach(el=>o[el.dataset.rk]=el.value);return o;}
function addRcp(seed){
  const d=rcpDefaults();
  rcpEntries.push(Object.assign({to:'',amount:'',note:d.defNote,method:d.defMethod,no:'',date:d.defDate},seed||{}));
  renderRcpForm();render();
}
function renderRcpForm(){
  const wrap=document.querySelector('.rcp-entries');wrap.innerHTML='';
  rcpEntries.forEach((e,i)=>{
    const div=document.createElement('div');div.className='rcp-entry';
    div.innerHTML=`<div class="ehead"><span class="tag">ページ ${i+1}</span>
      <button class="icon-btn" data-del="${i}" title="削除">×</button></div>
      <div class="field"><label>宛名（様の前）</label><input data-i="${i}" data-f="to" value="${esc(e.to)}" placeholder="若宮幼稚園"></div>
      <div class="row2">
        <div class="field"><label>金額（円）</label><input data-i="${i}" data-f="amount" type="number" step="any" value="${esc(e.amount)}" placeholder="3510"></div>
        <div class="field"><label>但し書き</label><input data-i="${i}" data-f="note" value="${esc(e.note)}" placeholder="衣装代"></div>
      </div>
      <div class="row2">
        <div class="field"><label>決済方法</label><input data-i="${i}" data-f="method" value="${esc(e.method)}"></div>
        <div class="field"><label>No.</label><input data-i="${i}" data-f="no" value="${esc(e.no)}" placeholder="任意"></div>
      </div>
      <div class="field"><label>決済日</label><input data-i="${i}" data-f="date" type="date" value="${esc(e.date)}"></div>`;
    wrap.appendChild(div);
  });
  wrap.querySelectorAll('input').forEach(inp=>inp.addEventListener('input',ev=>{
    rcpEntries[+ev.target.dataset.i][ev.target.dataset.f]=ev.target.value;render();
  }));
  wrap.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>{
    rcpEntries.splice(+b.dataset.del,1);renderRcpForm();render();
  }));
}
function rcpPage(e){
  const staff=document.querySelector('[data-rk="staff"]').value;
  const amt=e.amount!==''&&!isNaN(parseFloat(e.amount))?('￥'+Math.round(parseFloat(e.amount)).toLocaleString('ja-JP')+'.―'):'￥　　　.―';
  return `<div class="page-wrap"><div class="a4 rcp">
    <div class="rtop"><div>No. ${esc(e.no)||'&nbsp;'}</div><div>決済日：${fmtDate(e.date)||'　年　月　日'}</div></div>
    <div><span class="rto">${esc(e.to)||'&nbsp;'}　様</span></div>
    <div class="title">領　収　書</div><div class="title-underline"></div>
    <div class="ramtwrap"><span class="ramt">ご利用金額計：${amt}</span></div>
    <div class="rline"><b>決済方法：</b>${esc(e.method)}</div>
    <div class="rline"><b>但し：</b>${esc(e.note)}　として</div>
    <div class="rconfirm">上記正に領収いたしました。</div>
    <div class="rstaff">担当者：${esc(staff)}</div>
    <div class="foot-issuer">${issuerBlock()}
      <div class="bank">${ISSUER.bank}</div></div>
  </div></div>`;
}

/* ---------- main render ---------- */
let currentTab='est';
function render(){
  const pv=$('#preview');pv.innerHTML='';
  if(currentTab==='est'||currentTab==='inv'){
    pv.innerHTML=docPage(currentTab);
    const d=getDoc(currentTab);
    document.querySelector(`.total[data-total="${currentTab}"]`).textContent=yen(d.total);
  }else{
    if(rcpEntries.length===0){pv.innerHTML='<div class="empty-note">「＋ 宛名を追加」で領収書を作成してください。</div>';}
    else{
      rcpEntries.forEach((e,i)=>{
        const badge=document.createElement('div');badge.className='page-badge';badge.textContent=`ページ ${i+1} / ${rcpEntries.length}　${e.to||''} 様`;
        pv.appendChild(badge);
        const tmp=document.createElement('div');tmp.innerHTML=rcpPage(e);pv.appendChild(tmp.firstElementChild);
      });
    }
  }
  scalePages();
}
function scalePages(){
  const pane=$('#preview');const avail=pane.clientWidth-40;
  const scale=Math.min(1,avail/794);
  $$('#preview .page-wrap').forEach(p=>{p.style.transform=`scale(${scale})`;p.style.height=(1123*scale)+'px';p.style.marginBottom=(scale<1?0:0)+'px';});
}
window.addEventListener('resize',scalePages);

/* ---------- tabs ---------- */
$$('.tab').forEach(t=>t.addEventListener('click',()=>{
  $$('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');
  $$('.form').forEach(f=>f.classList.remove('active'));
  currentTab=t.dataset.tab;document.getElementById('form-'+currentTab).classList.add('active');
  render();
}));

/* ---------- PDF export ---------- */
async function exportPDF(){
  const btn=$('#pdfBtn');btn.disabled=true;const old=btn.textContent;btn.textContent='生成中…';
  try{
    await document.fonts.ready;
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({unit:'mm',format:'a4',orientation:'portrait'});
    // build offscreen render container at full scale
    const stage=document.createElement('div');
    stage.style.cssText='position:fixed;left:-9999px;top:0;background:#fff';
    document.body.appendChild(stage);
    let pagesHTML=[];let fname='';
    if(currentTab==='est'||currentTab==='inv'){
      const d=getDoc(currentTab);
      pagesHTML=[docPage(currentTab)];
      fname=`${yymmdd(d.date)}_${currentTab==='est'?'見積書':'請求書'}.pdf`;
    }else{
      if(rcpEntries.length===0){showToast('宛名を追加してください');btn.disabled=false;btn.textContent=old;stage.remove();return;}
      pagesHTML=rcpEntries.map(rcpPage);
      const fd=rcpEntries[0].date;fname=`${yymmdd(fd)}_領収書.pdf`;
    }
    for(let i=0;i<pagesHTML.length;i++){
      stage.innerHTML=pagesHTML[i];
      const el=stage.querySelector('.a4');
      el.parentElement.style.transform='none';
      const canvas=await html2canvas(el,{scale:2,backgroundColor:'#ffffff',useCORS:true,windowWidth:794});
      const img=canvas.toDataURL('image/jpeg',0.95);
      if(i>0)pdf.addPage();
      const pw=210,ph=297;
      const ratio=Math.min(pw/canvas.width,ph/canvas.height);
      const w=canvas.width*ratio,h=canvas.height*ratio;
      pdf.addImage(img,'JPEG',(pw-w)/2,0,w,h);
    }
    stage.remove();
    pdf.save(fname);
    showToast('PDFを出力しました：'+fname);
  }catch(err){console.error(err);showToast('エラー: '+err.message);}
  btn.disabled=false;btn.textContent=old;
}
$('#pdfBtn').addEventListener('click',exportPDF);

let toastTimer;
function showToast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),3200);}

/* ---------- init ---------- */
function init(){
  // dates
  $$('input[type=date][data-k="date"]').forEach(i=>i.value=todayISO());
  $('[data-rk="defDate"]').value=todayISO();
  // bind est/inv simple fields
  $$('.r').forEach(el=>el.addEventListener('input',render));
  $$('.rr').forEach(el=>el.addEventListener('input',()=>{render();}));
  // seed item rows (sample for estimate)
  addItem('est',{n:'作品収納バッグ 持ち手W 白',q:'630',p:'130'});
  addItem('est',{n:'シルク1色印刷',q:'630',p:'200'});
  addItem('est',{n:'版代',q:'1',p:'20000'});
  addItem('inv',{n:'',q:'',p:''});
  // receipt buttons
  $('#addRcp').addEventListener('click',()=>addRcp());
  // add-row buttons
  $$('[data-add]').forEach(b=>b.addEventListener('click',()=>addItem(b.dataset.add)));
  // one receipt to start
  addRcp({to:''});
  render();
}
init();
